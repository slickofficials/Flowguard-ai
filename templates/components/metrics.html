<!-- Metrics Component - Displays key system metrics -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Total Events -->
    <div class="metric-card">
        <div class="flex items-start justify-between mb-4">
            <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-accent-blue to-accent-purple flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <span class="metric-change positive">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5.293 9.707a1 1 0 010-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
                </svg>
                +12%
            </span>
        </div>
        <div class="metric-value">{{ total_events | default("0") }}</div>
        <div class="metric-label mt-2">Event Spine Records</div>
    </div>

    <!-- Active Incidents -->
    <div class="metric-card">
        <div class="flex items-start justify-between mb-4">
            <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-accent-red to-accent-yellow flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <span class="metric-change negative">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M14.707 10.293a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 111.414-1.414L9 12.586V5a1 1 0 012 0v7.586l2.293-2.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                </svg>
                -8%
            </span>
        </div>
        <div class="metric-value">{{ active_incidents | default("0") }}</div>
        <div class="metric-label mt-2">Active Workflow Leaks</div>
    </div>

    <!-- Autonomous Actions -->
    <div class="metric-card">
        <div class="flex items-start justify-between mb-4">
            <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-accent-green to-accent-cyan flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <span class="metric-change positive">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5.293 9.707a1 1 0 010-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
                </svg>
                +24%
            </span>
        </div>
        <div class="metric-value">{{ autonomous_actions | default("0") }}</div>
        <div class="metric-label mt-2">Executed Recovery Actions</div>
    </div>

    <!-- System Health -->
    <div class="metric-card">
        <div class="flex items-start justify-between mb-4">
            <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-accent-purple to-accent-blue flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
        </div>
        <div class="metric-value">{{ system_health | default("98") }}%</div>
        <div class="metric-label mt-2">System Health</div>
        <div class="mt-3">
            <div class="progress-bar">
                <div class="progress-fill" style="width: {{ system_health | default('98') }}%"></div>
            </div>
        </div>
    </div>
</div>
